# 统一日志模板（MessageFormat 风格，{0}..{n}）
# 所有模板以 "functionID: {0}, msgeId: <I/W/E>-{0}-XXXX, ..." 开头
# 约定：代码只传入 {0} = functionID（即 BusinessCode），之后的参数按业务占位顺序传入

# 转发 / API 调用相关
log.apiCallFailedResponseTimeout=functionID: {0}, msgeId: W-{0}-0302, {1}接口调用失败（响应超时）. (URL:{2}, Parameter:{3}, Header:{4}, ErrorMessage:{5})
log.apiCallFailedResponseNon200=functionID: {0}, msgeId: E-{0}-0301, {1}接口调用失败（响应异常）. (URL:{2}, Parameter:{3}, Header:{4}, Response:{5})
log.apiCallRetryExceeded=functionID: {0}, msgeId: E-{0}-0303, {1}接口调用失败（重试超过最大次数）. (URL:{2}, Parameter:{3}, Header:{4}, ErrorMessage:{5})
log.apiCallUnexpectedError=functionID: {0}, msgeId: E-{0}-0399, {1}接口调用失败（送信发生了意外错误）. (URL:{2}, Parameter:{3}, Header:{4}, ErrorMessage:{5})
log.processSuccess=functionID: {0}, msgeId: I-{0}-0001, 处理正常终了. (status_code:{1}, 送信URL:{2})

# 配置 / 环境
log.configError=functionID: {0}, msgeId: E-{0}-0001, 动作定义文件配置错误. 参数:{1}, 接收数据:{2}
log.envError=functionID: {0}, msgeId: E-{0}-0002, 环境配置信息错误. 参数:{1}, 接收数据:{2}

# BehaviorLoader
log.behavior.fileNotFound=functionID: {0}, msgeId: W-{0}-2001, behaviordefinition.json 未在指定路径找到, 将尝试 classpath 回退. (path:{1})
log.behavior.loaded=functionID: {0}, msgeId: I-{0}-1002, 成功加载行为定义文件. (path:{1})
log.behavior.loadFailed=functionID: {0}, msgeId: E-{0}-2003, 无法加载行为定义文件. (ErrorMessage:{1})
log.behavior.searchError=functionID: {0}, msgeId: E-{0}-2004, 查找 path 时发生错误. (path:{1}, ErrorMessage:{2})

# Controller / 请求接收
log.requestReceived=functionID: {0}, msgeId: I-{0}-1001, 接收到请求. (method:{1}, path:{2}, invokeId:{3})

# 全局异常
log.exception.business=functionID: {0}, msgeId: E-{0}-0400, BusinessException. (code:{1}, msg:{2}, invokeId:{3}, path:{4})
log.exception.unknown=functionID: {0}, msgeId: E-{0}-0399, 未知异常发生. (invokeId:{1}, path:{2}, ErrorMessage:{3})

# 线程中断（可选）
log.threadInterrupted=functionID: {0}, msgeId: E-{0}-2002, 线程被中断. (downstream:{1}, url:{2}, params:{3}, headers:{4}, ErrorMessage:{5})
